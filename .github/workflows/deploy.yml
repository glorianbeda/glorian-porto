name: CI/CD Deploy to DomCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ============================================
  # Single Job: Build image on GH Actions, deploy to server
  # ============================================
  build-deploy:
    name: 🔨 Build & 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build

      - name: Build Docker image locally
        run: docker build -t porto-app:latest .

      - name: Save Docker image to tar
        run: docker save porto-app:latest | gzip > porto-app.tar.gz

      - name: Copy image + compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "porto-app.tar.gz,docker-compose.yml"
          target: "~/public_html"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ~/public_html

            # Stop existing containers
            docker compose down --remove-orphans || true

            # Clean up old images
            docker system prune -a -f --volumes || true

            # Load pre-built image (no pull needed!)
            gunzip -c porto-app.tar.gz | docker load
            rm porto-app.tar.gz

            # Auto-detect DomCloud Nginx proxy port
            NGINX_PORT=$(grep -hoP 'proxy_pass http://127\.0\.0\.1:\K[0-9]+' /etc/nginx/conf.d/*.conf 2>/dev/null | head -n 1 || echo "8080")
            echo "Detected Nginx proxy port: $NGINX_PORT"

            # Start container
            PORT=$NGINX_PORT docker compose up -d

            # Verify
            echo "⏳ Waiting for services..."
            sleep 10
            docker compose ps
            docker compose logs --tail=10

      - name: Deploy summary
        run: |
          echo "### 🚀 Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ secrets.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
