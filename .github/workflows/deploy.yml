name: CI/CD Deploy to DomCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build

      - name: Build check summary
        run: |
          echo "### ✅ Build Successful" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: 🚀 Deploy to DomCloud (Non-Docker)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Copy files via SCP to public_html
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist/*"
          target: "/home/gbeda/public_html"
          strip_components: 1

      - name: Deploy summary
        run: |
          echo "### 🚀 Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ secrets.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
