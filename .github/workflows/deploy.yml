name: CI/CD Deploy to DomCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ============================================
  # Job 1: Build & Test
  # ============================================
  build-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build

      - name: Build check summary
        run: |
          echo "### ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: Built successfully" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: Deploy (only if build succeeds)
  # ============================================
  deploy:
    name: 🚀 Deploy to DomCloud
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: ".,!**/.git/**,!**/.github/**,!**/node_modules/**"
          target: "~/public_html"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 15m
          script: |
            cd ~/public_html

            # Stop existing containers (no prune - it crashes the daemon)
            docker compose down --remove-orphans || true

            # Auto-detect DomCloud Nginx proxy port
            NGINX_PORT=$(grep -hoP 'proxy_pass http://127\.0\.0\.1:\K[0-9]+' /etc/nginx/conf.d/*.conf 2>/dev/null | head -n 1 || echo "8080")
            echo "Detected Nginx proxy port: $NGINX_PORT"

            # Build and start with detected port
            PORT=$NGINX_PORT docker compose up -d --build

            # Verify
            echo "⏳ Waiting for services..."
            sleep 15
            docker compose ps
            docker compose logs --tail=20

      - name: Deploy summary
        run: |
          echo "### 🚀 Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ secrets.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
