name: CI/CD Deploy to DomCloud

on:
  push:
    branches:
      - main  # Change to your default branch if it's not main
  workflow_dispatch:

jobs:
  # ============================================
  # Job 1: Build & Test
  # ============================================
  build-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Build check summary
        run: |
          echo "### ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: Built successfully" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: Deploy (only if build succeeds)
  # ============================================
  deploy:
    name: 🚀 Deploy to DomCloud
    runs-on: ubuntu-latest
    needs: build-test  # Only deploy if build+test passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create deployment bundle
        run: tar -czf deploy.tar.gz dist/ nginx/ docker-compose.yml Dockerfile .dockerignore

      - name: Copy bundle via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "~/public_html"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ~/public_html

            # Extract bundle
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Stop existing containers
            docker compose down --remove-orphans || true

            # Free disk space (only unused images before build)
            docker image prune -a -f || true

            # Auto-detect DomCloud Nginx proxy port (FIXED)
            # Tambahkan -h agar grep tidak mencetak nama file
            NGINX_PORT=$(grep -hoP 'proxy_pass http://127\.0\.0\.1:\K[0-9]+' /etc/nginx/conf.d/*.conf 2>/dev/null | head -n 1 || echo "8080")
            echo "Detected Nginx proxy port: $NGINX_PORT"

            # Build and start with detected port
            PORT=$NGINX_PORT docker compose up -d --build

            # Wait and verify
            echo "⏳ Waiting for services..."
            sleep 15

            # Check status
            docker compose ps
            docker compose logs --tail=20

            # Clean cache and unused images AFTER build to keep disk empty
            echo "🧹 Cleaning up build cache and unused images..."
            docker builder prune -a -f || true
            docker image prune -a -f || true
            
      - name: Deploy summary
        run: |
          echo "### 🚀 Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ secrets.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
