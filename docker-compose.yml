services:
  # ============================================
  # Portfolio Frontend - Nginx serving Vite static files
  # ============================================
  app:
    image: nginx:alpine
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
